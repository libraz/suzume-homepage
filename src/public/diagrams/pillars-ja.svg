<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">Suzumeを小さく保つ3つの柱</title>
  <desc id="desc">最小限の辞書、文法パターン、動的スコアリングによってブラウザで扱いやすいサイズを実現する。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1e3a8a" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="920" height="300" rx="18" fill="url(#bg)"/>
  <text x="48" y="48" fill="#0f172a" font-family="system-ui, sans-serif" font-size="24" font-weight="700">Suzumeがgzipで500KB未満に収まる理由</text>
  <g filter="url(#shadow)">
    <rect x="52" y="92" width="210" height="112" rx="14" fill="#ffffff" stroke="#bfdbfe"/>
    <rect x="355" y="92" width="210" height="112" rx="14" fill="#ffffff" stroke="#bbf7d0"/>
    <rect x="658" y="92" width="210" height="112" rx="14" fill="#ffffff" stroke="#fde68a"/>
  </g>
  <circle cx="86" cy="128" r="18" fill="#2563eb"/>
  <circle cx="389" cy="128" r="18" fill="#059669"/>
  <circle cx="692" cy="128" r="18" fill="#d97706"/>
  <text x="80" y="135" fill="#ffffff" font-family="system-ui, sans-serif" font-size="18" font-weight="700">1</text>
  <text x="383" y="135" fill="#ffffff" font-family="system-ui, sans-serif" font-size="18" font-weight="700">2</text>
  <text x="686" y="135" fill="#ffffff" font-family="system-ui, sans-serif" font-size="18" font-weight="700">3</text>
  <text x="116" y="124" fill="#0f172a" font-family="system-ui, sans-serif" font-size="17" font-weight="700">最小限の辞書</text>
  <text x="116" y="151" fill="#475569" font-family="system-ui, sans-serif" font-size="14">助詞・助動詞・例外語を</text>
  <text x="116" y="173" fill="#475569" font-family="system-ui, sans-serif" font-size="14">中心に内蔵する。</text>
  <text x="419" y="124" fill="#0f172a" font-family="system-ui, sans-serif" font-size="17" font-weight="700">文法パターン</text>
  <text x="419" y="151" fill="#475569" font-family="system-ui, sans-serif" font-size="14">未知語を語構成から</text>
  <text x="419" y="173" fill="#475569" font-family="system-ui, sans-serif" font-size="14">候補化する。</text>
  <text x="722" y="124" fill="#0f172a" font-family="system-ui, sans-serif" font-size="17" font-weight="700">動的スコアリング</text>
  <text x="722" y="151" fill="#475569" font-family="system-ui, sans-serif" font-size="14">品詞のつながりを</text>
  <text x="722" y="173" fill="#475569" font-family="system-ui, sans-serif" font-size="14">実行時に評価する。</text>
  <path d="M267 148h70" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <path d="M331 142l10 6-10 6" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M570 148h70" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <path d="M634 142l10 6-10 6" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="285" y="232" width="350" height="42" rx="21" fill="#1d4ed8"/>
  <text x="460" y="259" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="16" font-weight="700">フロントエンドで扱いやすいサイズ</text>
</svg>
