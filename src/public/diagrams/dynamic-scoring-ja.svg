<svg xmlns="http://www.w3.org/2000/svg" width="920" height="260" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">動的な接続スコアリング</title>
  <desc id="desc">巨大な事前計算行列を同梱せず、実行時に品詞のつながりを評価する。</desc>
  <rect width="920" height="260" rx="18" fill="#f8fafc"/>
  <text x="48" y="48" fill="#0f172a" font-family="system-ui, sans-serif" font-size="24" font-weight="700">実行時に接続をスコアリングする</text>
  <rect x="70" y="100" width="170" height="68" rx="12" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="155" y="127" text-anchor="middle" fill="#1e3a8a" font-family="system-ui, sans-serif" font-size="14">直前のトークン</text>
  <text x="155" y="152" text-anchor="middle" fill="#0f172a" font-family="system-ui, sans-serif" font-size="20" font-weight="700">名詞</text>
  <rect x="300" y="100" width="170" height="68" rx="12" fill="#ede9fe" stroke="#c4b5fd"/>
  <text x="385" y="127" text-anchor="middle" fill="#5b21b6" font-family="system-ui, sans-serif" font-size="14">現在のトークン</text>
  <text x="385" y="152" text-anchor="middle" fill="#0f172a" font-family="system-ui, sans-serif" font-size="20" font-weight="700">を</text>
  <path d="M248 134h42" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <path d="M284 128l10 6-10 6" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="540" y="88" width="300" height="92" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="690" y="122" text-anchor="middle" fill="#0f172a" font-family="system-ui, sans-serif" font-size="18" font-weight="700">名詞 + を は自然</text>
  <text x="690" y="150" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="14">低コストを割り当て、Viterbiで最適経路を選ぶ。</text>
  <path d="M478 134h50" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <path d="M522 128l10 6-10 6" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="70" y="215" fill="#475569" font-family="system-ui, sans-serif" font-size="15">巨大な行列は配布せず、コンパクトなC++ルールをWASM内で実行します。</text>
</svg>
