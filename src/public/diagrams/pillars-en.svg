<svg xmlns="http://www.w3.org/2000/svg" width="920" height="300" viewBox="0 0 920 300" role="img" aria-labelledby="title desc">
  <title id="title">Suzume's three compactness pillars</title>
  <desc id="desc">Minimal dictionary, grammar patterns, and dynamic scoring combine into a small browser-ready tokenizer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1e3a8a" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="920" height="300" rx="18" fill="url(#bg)"/>
  <text x="48" y="48" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Why Suzume stays under 450KB gzipped</text>
  <g filter="url(#shadow)">
    <rect x="52" y="92" width="210" height="112" rx="14" fill="#ffffff" stroke="#bfdbfe"/>
    <rect x="355" y="92" width="210" height="112" rx="14" fill="#ffffff" stroke="#bbf7d0"/>
    <rect x="658" y="92" width="210" height="112" rx="14" fill="#ffffff" stroke="#fde68a"/>
  </g>
  <circle cx="86" cy="128" r="18" fill="#2563eb"/>
  <circle cx="389" cy="128" r="18" fill="#059669"/>
  <circle cx="692" cy="128" r="18" fill="#d97706"/>
  <text x="80" y="135" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">1</text>
  <text x="383" y="135" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">2</text>
  <text x="686" y="135" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">3</text>
  <text x="116" y="124" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Minimal dictionary</text>
  <text x="116" y="151" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="14">Keep function words,</text>
  <text x="116" y="173" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="14">particles, and exceptions.</text>
  <text x="419" y="124" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Grammar patterns</text>
  <text x="419" y="151" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="14">Infer unknown words from</text>
  <text x="419" y="173" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="14">Japanese word structure.</text>
  <text x="722" y="124" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Dynamic scoring</text>
  <text x="722" y="151" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="14">Compute likely POS</text>
  <text x="722" y="173" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="14">connections at runtime.</text>
  <path d="M267 148h70" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <path d="M331 142l10 6-10 6" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M570 148h70" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <path d="M634 142l10 6-10 6" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="285" y="232" width="350" height="42" rx="21" fill="#1d4ed8"/>
  <text x="460" y="259" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Small enough for frontend apps</text>
</svg>
